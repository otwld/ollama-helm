name: Helm Lint and Test

on:
  push:
    branches:
      - main
    paths-ignore:
      - .github/ISSUE_TEMPLATE/**
      - .github/workflows/cd.yaml
  pull_request:
    types:
      - opened
      - synchronize
      - reopened
    paths-ignore:
      - .github/ISSUE_TEMPLATE/**
      - .github/workflows/cd.yaml
  workflow_dispatch:

jobs:
  helm-lint:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - variant: standard
            display_name: Standard Kubernetes
            kind_cluster_name: chart-testing-standard
          - variant: knative
            display_name: Knative
            kind_cluster_name: chart-testing-knative
    env:
      KNATIVE_SERVING_VERSION: knative-v1.21.1
      KNATIVE_KOURIER_VERSION: knative-v1.21.0
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Helm
        uses: azure/setup-helm@v4
        with:
          version: v3.17.0

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          check-latest: true

      - name: Set up chart-testing
        uses: helm/chart-testing-action@v2

      - name: Create kind cluster
        uses: helm/kind-action@v1
        with:
          cluster_name: ${{ matrix.kind_cluster_name }}

      - name: Select CI values for standard variant
        if: matrix.variant == 'standard'
        run: mv ci/test-knative-values.yaml ci/test-knative-values.yaml.disabled

      - name: Select CI values for Knative variant
        if: matrix.variant == 'knative'
        run: mv ci/test-values.yaml ci/test-values.yaml.disabled

      - name: Install Knative Serving
        if: matrix.variant == 'knative'
        run: |
          set -euxo pipefail

          kubectl apply -f "https://github.com/knative/serving/releases/download/${KNATIVE_SERVING_VERSION}/serving-crds.yaml"
          kubectl apply -f "https://github.com/knative/serving/releases/download/${KNATIVE_SERVING_VERSION}/serving-core.yaml"

          kubectl wait --for=condition=Established --timeout=180s crd/services.serving.knative.dev
          kubectl wait --for=condition=Established --timeout=180s crd/configurations.serving.knative.dev
          kubectl wait --for=condition=Established --timeout=180s crd/revisions.serving.knative.dev
          kubectl wait --for=condition=Established --timeout=180s crd/routes.serving.knative.dev

          kubectl apply -f "https://github.com/knative-extensions/net-kourier/releases/download/${KNATIVE_KOURIER_VERSION}/kourier.yaml"
          kubectl patch configmap/config-network \
            --namespace knative-serving \
            --type merge \
            --patch '{"data":{"ingress-class":"kourier.ingress.networking.knative.dev"}}'
          kubectl patch configmap/config-features \
            --namespace knative-serving \
            --type merge \
            --patch '{"data":{"kubernetes.podspec-persistent-volume-claim":"enabled","kubernetes.podspec-persistent-volume-write":"enabled"}}'

          kubectl wait --namespace knative-serving --for=condition=Available deployment --all --timeout=300s
          kubectl wait --namespace kourier-system --for=condition=Available deployment --all --timeout=300s

      - name: Validate Knative manifests
        if: matrix.variant == 'knative'
        run: |
          set -euo pipefail

          rendered_manifest="$(mktemp)"
          prereq_manifest="$(mktemp)"
          warnings_file="$(mktemp)"
          cleanup() {
            kubectl delete -f "$prereq_manifest" --ignore-not-found=true >/dev/null 2>&1 || true
            rm -f "$rendered_manifest" "$prereq_manifest" "$warnings_file"
          }
          trap cleanup EXIT

          helm template knative-ci . -f ci/test-knative-values.yaml > "$rendered_manifest"

          awk '
            function flush() {
              if (keep && buffer != "") {
                printf "---\n%s", buffer
              }
              buffer = ""
              keep = 0
            }
            /^---$/ {
              flush()
              next
            }
            {
              buffer = buffer $0 ORS
              if ($0 ~ /^kind: (ServiceAccount|PersistentVolumeClaim)$/) {
                keep = 1
              }
            }
            END {
              flush()
            }
          ' "$rendered_manifest" > "$prereq_manifest"

          kubectl apply -f "$prereq_manifest"

          if ! kubectl apply --dry-run=server -f "$rendered_manifest" 2>"$warnings_file"; then
            cat "$warnings_file" >&2
            exit 1
          fi

          if [ -s "$warnings_file" ]; then
            cat "$warnings_file" >&2
            echo "Knative manifest validation emitted API warnings; failing the workflow." >&2
            exit 1
          fi

      - name: Run chart-testing
        run: ct lint-and-install --chart-dirs . --charts .

      - name: Collect Knative diagnostics
        if: failure() && matrix.variant == 'knative'
        run: |
          set +e

          kubectl get pods --all-namespaces
          kubectl get ksvc,configuration,revision,route --all-namespaces
          kubectl logs deployment/controller --namespace knative-serving
          kubectl logs deployment/webhook --namespace knative-serving
          kubectl logs deployment/net-kourier-controller --namespace knative-serving
          kubectl logs deployment/3scale-kourier-gateway --namespace kourier-system
