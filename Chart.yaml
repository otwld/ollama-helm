apiVersion: v2
name: ollama
description: Get up and running with large language models locally.

type: application

version: 1.55.0

appVersion: 0.21.0

annotations:
  artifacthub.io/category: ai-machine-learning
  artifacthub.io/changes: |
    - kind: changed
      description: add schedulerName Support for Pods
    - kind: changed
      description: add matrix CI coverage for standard Kubernetes and Knative installs
    - kind: changed
      description: make the chart compatible with Knative Serving and enable Helm tests in Knative mode
    - kind: changed
      description: move Knative model bootstrap to a non-blocking Job that reruns when Knative model settings change
    - kind: changed
      description: add configurable cleanup TTL for completed Knative bootstrap Jobs

kubeVersion: "^1.16.0-0"
home: https://ollama.ai/
icon: https://ollama.ai/public/ollama.png
keywords:
  - ai
  - llm
  - llama
  - mistral
sources:
  - https://github.com/ollama/ollama
  - https://github.com/otwld/ollama-helm
maintainers:
  - name: OTWLD
    email: contact@otwld.com
